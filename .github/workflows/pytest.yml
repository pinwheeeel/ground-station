name: Pytest

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: gs
        ports:
          - "5432:5432"

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: "recursive"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install cmake gcc
          python -m pip install --upgrade pip uv
          uv sync --extra dev

      - name: Create CI .env file
        run: |
          cat > .env << EOF
          GS_DATABASE_USER=ci_user
          GS_DATABASE_PASSWORD=ci_password
          GS_DATABASE_LOCATION=localhost
          GS_DATABASE_PORT=5432
          GS_DATABASE_NAME=gs
          KEYCLOAK_URL=http://localhost:8080
          KEYCLOAK_REALM=mcc
          KEYCLOAK_CLIENT_ID=ground-station
          KEYCLOAK_CLIENT_SECRET=foobar676767brainrot
          KEYCLOAK_CALLBACK_URL=http://localhost:8000/callback
          EOF

      - name: Run Alembic migrations
        run: |
          cd backend
          uv run alembic upgrade head

      - name: Build Interfaces
        run: |
          cd backend/interfaces
          mkdir build
          cd build
          cmake ..
          make -j 16

      - name: Run pytest
        env:
          GS_DATABASE_USER: ci_user
          GS_DATABASE_PASSWORD: ci_password
          GS_DATABASE_LOCATION: localhost
          GS_DATABASE_PORT: 5432
          GS_DATABASE_NAME: gs
          KEYCLOAK_URL: http://localhost:8080
          KEYCLOAK_REALM: mcc
          KEYCLOAK_CLIENT_ID: ground-station
          KEYCLOAK_CLIENT_SECRET: foobar676767brainrot
          KEYCLOAK_CALLBACK_URL: http://localhost:8000/callback
        run: |
          uv run pytest
